

services:
    api:
      build: .
      depends_on:
        - postgres
      ports:
        - 8000:8000
      volumes:
        - ./:/usr/src/app  
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    #  env_file:
    #     - ./.env
      environment:
        - DATABASE_HOSTNAME=postgres
        - DATABASE_PORT=5432
        - DATABASE_PASSWORD=Suhani#7820
        - DATABASE_USERNAME=postgres
        - DATABASE_NAME=fastapi
        - SECRET_KEY=suhani
        - ALGORITHM=HS256
        - ACCESS_TOKEN_EXPIRE_MINUTES=30
    postgres:
      image: postgres:17
      environment:
        - POSTGRES_PASSWORD=Suhani#7820
        - POSTGRES_DB=fastapi

      volumes:
        - postgres-db:/var/lib/postgresql/data

volumes:
    postgres-db:
