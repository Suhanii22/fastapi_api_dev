

name: Build and Deploy Code

#  triggers
on: [push , pull_request]

jobs:
  job1:
    environment:
      name : testing_dev
    env:
      DATABASE_HOSTNAME: ${{ vars.DATABASE_HOSTNAME }}
      DATABASE_PORT: ${{ vars.DATABASE_PORT }}
      DATABASE_PASSWORD: ${{ vars.DATABASE_PASSWORD }}
      DATABASE_USERNAME: ${{ vars.DATABASE_USERNAME }}
      DATABASE_NAME: ${{ vars.DATABASE_NAME }}
      SECRET_KEY: ${{ vars.SECRET_KEY }}
      ALGORITHM: ${{ vars.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
  
    runs-on: ubuntu-latest
    steps:  
      - name: pulling git repo
        uses: actions/checkout@v7
      - name: Install python version 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Print variables
        run: |
           echo $DATABASE_HOSTNAME
           echo $DATABASE_PORT
           echo $DATABASE_USERNAME
           echo $DATABASE_NAME     
      - name: update pip
        run: python -m pip install --upgrade pip 
      - name: install all dependencies
        run: pip install -r requirements.txt 
      - name: test with pytest
        run: |
          pip install pytest
          pytest  
  




